name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: macos-15
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Zig
        uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2
        with:
          version: 0.16.0

      - name: Check Zig formatting
        run: zig fmt --check .

      - name: Test Zig core
        run: zig build test

      - name: Check Swift formatting
        run: swift format lint --recursive --strict macos/Sources

      - name: Build macOS application
        run: zig build app

      - name: Verify application artifact
        run: test -d zig-out/xcode/Build/Products/Debug/Bobrshot.app
